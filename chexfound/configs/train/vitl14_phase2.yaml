MODEL:
  WEIGHTS: ''  # set --phase1-checkpoint in CLI instead

compute_precision:
  grad_scaler: false
  teacher:
    backbone:
      sharding_strategy: SHARD_GRAD_OP
      mixed_precision:
        param_dtype: bf16
        reduce_dtype: bf16
        buffer_dtype: fp32
    ibot_head:
      sharding_strategy: SHARD_GRAD_OP
      mixed_precision:
        param_dtype: bf16
        reduce_dtype: fp32
        buffer_dtype: fp32
  student:
    backbone:
      sharding_strategy: SHARD_GRAD_OP
      mixed_precision:
        param_dtype: bf16
        reduce_dtype: bf16
        buffer_dtype: fp32
    ibot_head:
      sharding_strategy: SHARD_GRAD_OP
      mixed_precision:
        param_dtype: bf16
        reduce_dtype: fp32
        buffer_dtype: fp32

prototype:
  K: 512
  d: 1024
  tau_t: 0.04
  tau_s: 0.1
  queue_size: 131072
  sinkhorn_iters: 3
  lambda_A: 0.1   # lower weight in Phase 2 (prototype dict is frozen)
  init_path: ''

residual:
  lambda_R: 1.0
  lambda_A_P2: 0.1
  tau_w: 0.5
  warmup_epochs: 20   # dynamic weighting activates after epoch 20

dino:
  loss_weight: 0.0
  head_n_prototypes: 16384
  head_bottleneck_dim: 256
  head_hidden_dim: 2048
  head_nlayers: 3
  koleo_loss_weight: 0.0

ibot:
  loss_weight: 1.0
  separate_head: true
  head_n_prototypes: 16384
  head_bottleneck_dim: 256
  head_hidden_dim: 2048
  head_nlayers: 3
  mask_ratio_min_max:
    - 0.7
    - 0.7   # fixed 70% masking in Phase 2
  mask_sample_probability: 1.0

student:
  arch: vit_large
  patch_size: 14
  drop_path_rate: 0.4
  ffn_layer: swiglufused
  block_chunks: 4
  num_register_tokens: 4
  pretrained_weights: ''
  layerscale: 1.0e-05
  drop_path_uniform: true
  qkv_bias: true
  proj_bias: true
  ffn_bias: true
  interpolate_antialias: false
  interpolate_offset: 0.1

teacher:
  momentum_teacher: 0.9995
  final_momentum_teacher: 1.0
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 5

optim:
  epochs: 50
  weight_decay: 0.04
  weight_decay_end: 0.4
  base_lr: 5.0e-05
  lr: 0.
  min_lr: 1.0e-06
  warmup_epochs: 5
  clip_grad: 3.0
  freeze_last_layer_epochs: 0
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  layerwise_decay: 1.0
  adamw_beta1: 0.9
  adamw_beta2: 0.999

train:
  batch_size_per_gpu: 14
  dataset_path: ImageNet:split=TRAIN
  output_dir: .
  num_workers: 4
  OFFICIAL_EPOCH_LENGTH: 2500
  centering: sinkhorn_knopp
  seed: 0

crops:
  global_crops_size: 518
  local_crops_size: 140
  global_crops_scale:
    - 0.4
    - 1.0
  local_crops_scale:
    - 0.05
    - 0.4
  local_crops_number: 8

evaluation:
  eval_period_iterations: 5000
